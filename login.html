<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sign in to ANGLE</title>
  <meta name="description" content="Sign in to your ANGLE account.">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <style>
    :root {
      color-scheme: light;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #111111;
      background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #ffffff;
    }

    body {
      min-height: 100svh;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    .login-page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 104px 24px 72px;
    }

    .login-brand {
      position: fixed;
      top: max(30px, env(safe-area-inset-top));
      left: 32px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .login-brand img {
      width: 34px;
      height: 34px;
      display: block;
      object-fit: contain;
    }

    .login-brand span {
      font-size: 21px;
      font-weight: 700;
    }

    .login-panel {
      width: min(640px, 100%);
      transform: translateY(-2vh);
    }

    .login-panel h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .login-intro {
      margin: 20px 0 22px;
      font-size: 17px;
      line-height: 1.4;
    }

    .login-intro a {
      font-weight: 700;
      text-underline-offset: 3px;
    }

    .login-form {
      display: grid;
      gap: 24px;
    }

    .login-field {
      position: relative;
      min-height: 72px;
    }

    .login-field label {
      position: absolute;
      top: 13px;
      left: 17px;
      z-index: 1;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
      pointer-events: none;
    }

    .login-field input {
      width: 100%;
      height: 72px;
      padding: 30px 17px 10px;
      border: 2px solid #171717;
      border-radius: 8px;
      outline: 0;
      background: #ffffff;
      color: #111111;
      font-size: 18px;
    }

    .login-field input:focus-visible {
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.14);
    }

    .login-primary,
    .login-passkey {
      width: 100%;
      min-height: 56px;
      padding: 0 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    .login-primary {
      background: #111111;
      color: #ffffff;
    }

    .login-primary:hover {
      background: #2b2b2b;
    }

    .login-passkey {
      background: #f0f0f0;
      color: #111111;
    }

    .login-passkey:hover {
      background: #e7e7e7;
    }

    .login-passkey svg {
      width: 21px;
      height: 21px;
      flex: 0 0 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 24px;
      align-items: center;
      color: #333333;
      font-size: 15px;
    }

    .login-divider::before,
    .login-divider::after {
      content: "";
      height: 1px;
      background: #e6e6e6;
    }

    .login-primary:focus-visible,
    .login-passkey:focus-visible,
    .login-brand:focus-visible,
    .login-intro a:focus-visible {
      outline: 3px solid rgba(17, 17, 17, 0.28);
      outline-offset: 3px;
    }

    @media (max-width: 640px) {
      .login-page {
        place-items: start stretch;
        padding: 154px 20px 48px;
      }

      .login-brand {
        top: max(24px, env(safe-area-inset-top));
        left: 20px;
      }

      .login-brand img {
        width: 32px;
        height: 32px;
      }

      .login-brand span {
        font-size: 20px;
      }

      .login-panel {
        width: 100%;
        transform: none;
      }

      .login-panel h1 {
        font-size: 29px;
      }

      .login-intro {
        margin-top: 17px;
        font-size: 16px;
      }

      .login-form {
        gap: 20px;
      }

      .login-field,
      .login-field input {
        min-height: 68px;
        height: 68px;
      }

      .login-primary,
      .login-passkey {
        min-height: 54px;
        font-size: 16px;
      }

      .login-divider {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <a class="login-brand" href="../" aria-label="Back to ANGLE home">
    <img src="../favicon.png" alt="">
    <span>ANGLE</span>
  </a>

  <main class="login-page">
    <section class="login-panel" aria-labelledby="login-title">
      <h1 id="login-title">Sign in</h1>
      <p class="login-intro">New to ANGLE? <a href="#">Sign up</a></p>

      <form class="login-form" data-login-form>
        <div class="login-field">
          <label for="login-identity">Email or phone number</label>
          <input id="login-identity" name="identity" type="text" autocomplete="username" required aria-required="true">
        </div>

        <button class="login-primary" type="submit">Continue</button>

        <div class="login-divider" aria-hidden="true"><span>or</span></div>

        <button class="login-passkey" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="7.5" cy="15.5" r="3.5"></circle>
            <path d="M11 15.5h10M18 15.5v3M15 15.5v2"></path>
            <path d="M7.5 12V9.5a4.5 4.5 0 0 1 9 0v1"></path>
          </svg>
          <span>Sign in with a passkey</span>
        </button>
      </form>
    </section>
  </main>

  <script>
    document.querySelector('[data-login-form]').addEventListener('submit', (event) => {
      event.preventDefault();
    });
  </script>
</body>
</html>
